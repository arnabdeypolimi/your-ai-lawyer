<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 260" role="img" aria-label="Your AI Lawyer logo">
  <title>Your AI Lawyer</title>

  <!-- Balance beam -->
  <line x1="170" y1="78" x2="470" y2="78" stroke="#1e3a8a" stroke-width="4" stroke-linecap="round"/>
  <!-- Fulcrum top ornament -->
  <circle cx="320" cy="68" r="9" fill="#1e3a8a"/>
  <!-- Pillar -->
  <line x1="320" y1="78" x2="320" y2="190" stroke="#1e3a8a" stroke-width="5" stroke-linecap="round"/>
  <!-- Base -->
  <rect x="272" y="188" width="96" height="8" rx="3" fill="#1e3a8a"/>

  <!-- Left hanging chain -->
  <line x1="170" y1="78" x2="170" y2="108" stroke="#1e3a8a" stroke-width="2.5"/>

  <!-- Left pan: knowledge graph cluster -->
  <line x1="140" y1="128" x2="170" y2="115" stroke="#93c5fd" stroke-width="1.6"/>
  <line x1="200" y1="128" x2="170" y2="115" stroke="#93c5fd" stroke-width="1.6"/>
  <line x1="140" y1="128" x2="155" y2="158" stroke="#93c5fd" stroke-width="1.6"/>
  <line x1="200" y1="128" x2="185" y2="158" stroke="#93c5fd" stroke-width="1.6"/>
  <line x1="155" y1="158" x2="185" y2="158" stroke="#93c5fd" stroke-width="1.6"/>
  <line x1="170" y1="115" x2="155" y2="158" stroke="#93c5fd" stroke-width="1.6"/>
  <line x1="170" y1="115" x2="185" y2="158" stroke="#93c5fd" stroke-width="1.6"/>
  <circle cx="170" cy="115" r="8" fill="#2563eb"/>
  <circle cx="140" cy="128" r="6.5" fill="#3b82f6"/>
  <circle cx="200" cy="128" r="6.5" fill="#3b82f6"/>
  <circle cx="155" cy="158" r="5.5" fill="#60a5fa"/>
  <circle cx="185" cy="158" r="5.5" fill="#60a5fa"/>

  <!-- Right hanging chain -->
  <line x1="470" y1="78" x2="470" y2="108" stroke="#1e3a8a" stroke-width="2.5"/>

  <!-- Right pan: knowledge graph cluster -->
  <line x1="440" y1="128" x2="470" y2="115" stroke="#93c5fd" stroke-width="1.6"/>
  <line x1="500" y1="128" x2="470" y2="115" stroke="#93c5fd" stroke-width="1.6"/>
  <line x1="440" y1="128" x2="455" y2="158" stroke="#93c5fd" stroke-width="1.6"/>
  <line x1="500" y1="128" x2="485" y2="158" stroke="#93c5fd" stroke-width="1.6"/>
  <line x1="455" y1="158" x2="485" y2="158" stroke="#93c5fd" stroke-width="1.6"/>
  <line x1="470" y1="115" x2="455" y2="158" stroke="#93c5fd" stroke-width="1.6"/>
  <line x1="470" y1="115" x2="485" y2="158" stroke="#93c5fd" stroke-width="1.6"/>
  <circle cx="470" cy="115" r="8" fill="#2563eb"/>
  <circle cx="440" cy="128" r="6.5" fill="#3b82f6"/>
  <circle cx="500" cy="128" r="6.5" fill="#3b82f6"/>
  <circle cx="455" cy="158" r="5.5" fill="#60a5fa"/>
  <circle cx="485" cy="158" r="5.5" fill="#60a5fa"/>

  <!-- Wordmark -->
  <text x="320" y="235" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="600" fill="#1e3a8a" letter-spacing="1">
    Your <tspan fill="#2563eb">AI</tspan> Lawyer
  </text>
</svg>
